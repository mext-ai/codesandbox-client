[build]
builder = "RAILPACK"
buildCommand = "npm run build:deps && npm run build:sandpack"

[deploy]
runtime = "V2"
numReplicas = 1
startCommand = "npx serve www -l ${PORT:-3000}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
sleepApplication = false
useLegacyStacker = false

[deploy.limitOverride.containers]
cpu = 2
memoryBytes = 2000000000

[deploy.multiRegionConfig.europe-west4-drams3a]
numReplicas = 1
