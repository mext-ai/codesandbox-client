<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MEXTY - Sandbox</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="https://mexty.ai/favicon.ico" />
    <script
      src="/static/browserfs12/browserfs.min.js"
      type="text/javascript"
    ></script>
    <script>
      (window.process = BrowserFS.BFSRequire("process")),
        (window.Buffer = BrowserFS.BFSRequire("buffer").Buffer);
    </script>
  </head>
  <body>
    <div id="csb-loading-screen"></div>
    <script
      src="/static/js/vendors~sandbox.df004db9a.chunk.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="/static/js/default~sandbox~sandbox-startup.603597b68.chunk.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="/static/js/sandbox.88bc45c11.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="/static/js/vendors~sandbox-startup.ca8a95b40.chunk.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="/static/js/sandbox-startup.a0ea8d1cb.js"
      crossorigin="anonymous"
    ></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              console.log("SW registered:", registration);
            })
            .catch((error) => {
              console.log("SW registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>
